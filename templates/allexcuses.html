<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>review the excuses</title>
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <button onClick="history.back()">go back</button>

        <h1 class="text-3xl">read all the excuses</h1>
        <ul>
            <li>excuses show here or smth idk</li>
        </ul>
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
            <div
                class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">
                <table
                    class="w-full text-sm text-left rtl:text-right text-body">
                    <thead
                        class="text-sm text-body bg-neutral-secondary-soft border-b rounded-base border-default">
                        <tr>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Name
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Excuse
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Points
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Rank
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for excuse in excuses %}
                        <tr class="bg-neutral-primary border-b border-default">
                            <th scope="row"
                                class="px-6 py-4 font-medium text-heading whitespace-nowrap">
                                {{ excuse.name }}
                            </th>
                            <td class="px-6 py-4">
                                {{ excuse.excuse }}
                            </td>
                            <td class="px-6 py-4">
                                {{ excuse.points }}
                            </td>
                            <td class="px-6 py-4">
                                {{ excuse.rank }}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
